<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tech Sunlight</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{font-family:Poppins,Arial;margin:0;background:#f4f7fb;color:#222}

/* HEADER */
header{
background:#0f172a;
color:white;
padding:18px 25px;
}

.header-wrap{
max-width:1150px;
margin:auto;
display:flex;
align-items:center;
gap:15px
}

.logo{
width:55px;
height:55px;
border-radius:10px;
object-fit:cover
}

.brand h1{
margin:0;
font-size:26px
}

.brand p{
margin:0;
font-size:12px;
opacity:.8
}

/* NAV */
nav{
background:#020617;
padding:12px;
text-align:center
}

nav a{
color:white;
text-decoration:none;
margin:0 15px;
font-size:14px
}

nav a:hover{color:#38bdf8}

/* HERO BANNER */
.hero{
background:linear-gradient(120deg,#1e3a8a,#2563eb,#38bdf8);
color:white;
padding:60px 20px;
text-align:center
}

.hero h2{
margin:0;
font-size:34px
}

.hero p{
margin-top:10px;
opacity:.9
}

/* MAIN CONTAINER */
.container{
max-width:1150px;
margin:auto;
padding:30px 20px
}

.section-title{
font-size:24px;
margin-bottom:15px
}

.card{
background:white;
padding:22px;
border-radius:14px;
margin-bottom:30px;
box-shadow:0 10px 25px rgba(0,0,0,.08)
}

iframe{
width:100%;
height:420px;
border:none;
border-radius:10px
}

/* BLOG GRID */
.blog-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px
}

.blog-card{
background:white;
padding:18px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,.08);
transition:.25s
}

.blog-card:hover{
transform:translateY(-6px)
}

.blog-card h3{margin-top:0}

.btn{
display:inline-block;
margin-top:10px;
background:#2563eb;
color:white;
padding:9px 16px;
text-decoration:none;
border-radius:6px;
font-size:14px
}

.btn:hover{background:#1d4ed8}

/* YOUTUBE SECTION */
.youtube-box{
background:#0f172a;
color:white;
padding:35px;
border-radius:14px;
text-align:center
}

.youtube-box a{
color:#38bdf8;
font-weight:600;
text-decoration:none
}

/* FOOTER */
footer{
margin-top:50px;
background:#020617;
color:#aaa;
padding:22px;
text-align:center;
font-size:14px
}

@media(max-width:700px){
iframe{height:250px}
.hero h2{font-size:26px}
}

</style>
</head>

<body>

<header>
<div class="header-wrap">

<!-- Upload logo.png later -->
<img src="Untitled_design-removebg-preview.png" class="logo" alt="Tech Sunlight Logo">

<div class="brand">
<h1>Tech Sunlight</h1>
<p>Tech Reviews • Tutorials • YouTube Videos</p>
</div>

</div>
</header>

<nav>
<a href="#">Home</a>
<a href="#videos">Videos</a>
<a href="#blog">Tech Blog</a>
<a href="#youtube">YouTube</a>
</nav>

<section class="hero">
<h2>Welcome to Tech Sunlight</h2>
<p>Latest tech reviews, gadgets and YouTube tutorials</p>
</section>

<div class="container">

<section id="videos" class="card">
<h2 class="section-title">Highest Views</h2>
<p><iframe width="560" height="315" src="https://www.youtube.com/embed/HxQdA-P6Hos?si=FqaRqb-257CMmKaz" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe></p>

<iframe src="https://https://youtube.com/@techsunlight?si=omc3zELcRuW_Ush_></iframe>

</section>

<section id="blog">
<h2 class="section-title">Latest Tech Articles</h2>

<div class="blog-grid">

<div class="blog-card">
<h3>iQOO Z3 5G Review</h3>
<p>Camera test, gaming performance and battery review.</p>
<a class="btn" href="#">Read More</a>
</div>

<div class="blog-card">
<h3>Best Vlogging Tripod</h3>
<p>Digitek DTR-200 MT mini tripod full review.</p>
<a class="btn" href="#">Read More</a>
</div>

<div class="blog-card">
<h3>Top 5 Editing Apps</h3>
<p>Best Android editing apps for YouTubers.</p>
<a class="btn" href="#">Read More</a>
</div>

<div class="blog-card">
<h3>Budget Mic For YouTube</h3>
<p>Best affordable microphones for creators.</p>
<a class="btn" href="#">Read More</a>
</div>

</div>
</section>

<section id="youtube" class="card">
<div class="youtube-box">
<h2>Visit Our YouTube Channel</h2>
<p>Subscribe for latest tech reviews and tutorials</p>
<p><a href="https://www.youtube.com/@TechSunlight" target="_blank">Open YouTube Channel</a></p>
</div>
</section>

</div>

<footer>
<p>© 2026 Tech Sunlight • Created by Deepak</p>
</footer>

</body>
</html>
