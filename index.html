<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tech Sunlight</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }
    header {
      background: linear-gradient(90deg, #007bff, #6f42c1);
      color: white;
      padding: 15px;
      text-align: center;
    }
    .container {
      padding: 20px;
    }
    .card {
      background: white;
      padding: 10px;
      margin: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 15px;
    }
    iframe {
      width: 100%;
      height: 200px;
      border-radius: 10px;
    }
    input, textarea {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }
    button {
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <h1>🚀 Tech Sunlight</h1>
  <a href="https://www.youtube.com/@TechSunlight" target="_blank" style="color:white;">Visit YouTube Channel</a>
</header>

<div class="container">

  <!-- Article Upload -->
  <div class="card">
    <h2>Upload Article</h2>
    <input type="text" id="title" placeholder="Title">
    <textarea id="content" placeholder="Content"></textarea>
    <input type="file" id="image">
    <button onclick="addArticle()">Post Article</button>
  </div>

  <!-- Latest Articles -->
  <h2>Latest Articles</h2>
  <div id="articles" class="grid"></div>

  <!-- Latest Videos -->
  <h2>Latest Videos</h2>
  <div id="latestVideos" class="grid"></div>

  <!-- Trending Videos -->
  <h2>Trending Videos</h2>
  <div id="topVideos" class="grid"></div>

</div>

<script>
let articles = [];

// Add Article
function addArticle() {
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;
  const imageFile = document.getElementById("image").files[0];

  const reader = new FileReader();
  reader.onload = function() {
    articles.unshift({
      title,
      content,
      image: reader.result,
      date: new Date()
    });
    displayArticles();
  };

  if (imageFile) reader.readAsDataURL(imageFile);
}

// Display Articles
function displayArticles() {
  const container = document.getElementById("articles");
  container.innerHTML = "";
  articles.sort((a,b) => b.date - a.date);

  articles.forEach(a => {
    container.innerHTML += `
      <div class="card">
        ${a.image ? `<img src="${a.image}" style="width:100%;height:150px;">` : ""}
        <h3>${a.title}</h3>
        <p>${a.content}</p>
      </div>
    `;
  });
}

// 🔴 YouTube API (ADD YOUR KEY)
const API_KEY = "YOUR_API_KEY";
const CHANNEL_ID = "YOUR_CHANNEL_ID";

// Fetch Videos
async function fetchVideos() {
  const res = await fetch(`https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet,id&order=date&maxResults=6`);
  const data = await res.json();

  let videoIds = data.items.map(v => v.id.videoId).join(",");

  const statsRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?key=${API_KEY}&id=${videoIds}&part=statistics`);
  const statsData = await statsRes.json();

  let videos = data.items.map((v,i) => ({
    id: v.id.videoId,
    url: `https://www.youtube.com/embed/${v.id.videoId}`,
    views: parseInt(statsData.items[i].statistics.viewCount),
    date: new Date(v.snippet.publishedAt)
  }));

  showVideos(videos);
}

// Show Videos
function showVideos(videos) {
  const latest = [...videos].sort((a,b)=>b.date-a.date);
  const top = [...videos].sort((a,b)=>b.views-a.views);

  document.getElementById("latestVideos").innerHTML = latest.map(v =>
    `<iframe src="${v.url}" allowfullscreen></iframe>`
  ).join("");

  document.getElementById("topVideos").innerHTML = top.map(v =>
    `<iframe src="${v.url}" allowfullscreen></iframe>`
  ).join("");
}

// Load Videos
fetchVideos();
</script>

</body>
</html>
